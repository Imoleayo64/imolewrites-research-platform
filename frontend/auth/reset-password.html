<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — ImoleWrites Research Hub</title>
  <meta name="description" content="Set a new password for your ImoleWrites Research Hub account." />
  <meta name="theme-color" content="#ffffff" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%232563eb'/%3E%3Cpath d='M9 17V8.5l5 3.5-5 3.5z' fill='white'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div class="auth">
    <aside class="auth__aside">
      <a class="logo" href="../index.html"><span class="logo__mark"><span data-icon="logo"></span></span><span class="logo__name">Imole<b>Writes</b></span></a>
      <div><p class="auth__quote">Choose a strong password to keep your research secure.</p></div>
      <div class="auth__stats"><div><div class="n">AES-256</div><div class="l">Encryption</div></div><div><div class="n">SOC 2</div><div class="l">Aligned</div></div></div>
    </aside>

    <main class="auth__main">
      <div class="auth__card">
        <a class="auth__back" href="login.html"><span data-icon="arrowRight" style="transform:scaleX(-1);"></span> Back to login</a>
        <div class="verify-icon"><span data-icon="lock"></span></div>
        <h1 class="text-center" style="margin-block:24px 8px;">Set a new password</h1>
        <p class="text-muted text-center" style="margin-bottom:28px;">Enter the code we sent to your email and choose a new password.</p>

        <div class="field">
          <label class="label">Verification code</label>
          <div class="otp-inputs">
            <input class="input" maxlength="1" inputmode="numeric" value="4" />
            <input class="input" maxlength="1" inputmode="numeric" value="8" />
            <input class="input" maxlength="1" inputmode="numeric" value="2" />
            <input class="input" maxlength="1" inputmode="numeric" value="1" />
            <input class="input" maxlength="1" inputmode="numeric" />
            <input class="input" maxlength="1" inputmode="numeric" />
          </div>
        </div>

        <form data-demo-form="reset" data-redirect="login.html">
          <div class="field">
            <label class="label" for="password">New password</label>
            <div class="input-group">
              <span class="input-icon"><span data-icon="lock"></span></span>
              <input class="input" id="password" type="password" placeholder="••••••••" required style="padding-right:46px;" />
              <span class="input-affix"><button type="button" data-pw-toggle="password" aria-label="Show password">
                <span class="pw-show"><span data-icon="eye"></span></span>
                <span class="pw-hide" style="display:none;"><span data-icon="eyeOff"></span></span>
              </button></span>
            </div>
          </div>
          <div class="field">
            <label class="label" for="confirm">Confirm password</label>
            <div class="input-group">
              <span class="input-icon"><span data-icon="lock"></span></span>
              <input class="input" id="confirm" type="password" placeholder="••••••••" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Reset password <span data-icon="check2"></span></button>
        </form>

        <p class="auth__foot">Didn't get a code? <a class="text-blue fw-semibold" href="#">Resend</a></p>
      </div>
    </main>
  </div>

  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    // Auto-advance OTP inputs
    document.querySelectorAll('.otp-inputs input').forEach((inp, i, arr) => {
      inp.addEventListener('input', () => { if (inp.value && i < arr.length - 1) arr[i + 1].focus(); });
      inp.addEventListener('keydown', (e) => { if (e.key === 'Backspace' && !inp.value && i > 0) arr[i - 1].focus(); });
    });
  </script>
</body>
</html>
