<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — ImoleWrites Research Hub</title>
  <meta name="description" content="Reset your ImoleWrites Research Hub password." />
  <meta name="theme-color" content="#ffffff" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%232563eb'/%3E%3Cpath d='M9 17V8.5l5 3.5-5 3.5z' fill='white'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div class="auth">
    <aside class="auth__aside">
      <a class="logo" href="../index.html"><span class="logo__mark"><span data-icon="logo"></span></span><span class="logo__name">Imole<b>Writes</b></span></a>
      <div>
        <p class="auth__quote">Never lose access to your research. We'll help you get back in — securely.</p>
      </div>
      <div class="auth__stats"><div><div class="n">120k+</div><div class="l">Researchers</div></div><div><div class="n">99.9%</div><div class="l">Uptime</div></div></div>
    </aside>

    <main class="auth__main">
      <div class="auth__card">
        <a class="auth__back" href="login.html"><span data-icon="arrowRight" style="transform:scaleX(-1);"></span> Back to login</a>
        <div class="verify-icon" style="background:var(--grad-cool);"><span data-icon="key"></span></div>
        <h1 class="text-center" style="margin-block:24px 8px;">Forgot your password?</h1>
        <p class="text-muted text-center" style="margin-bottom:28px;">No worries. Enter your email and we'll send you reset instructions.</p>

        <form data-demo-form="forgot" data-redirect="reset-password.html">
          <div class="field">
            <label class="label" for="email">Email</label>
            <div class="input-group"><span class="input-icon"><span data-icon="mail"></span></span><input class="input" id="email" type="email" placeholder="you@university.edu" required /></div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Send reset link <span data-icon="send"></span></button>
        </form>

        <p class="auth__foot">Remembered it? <a class="text-blue fw-semibold" href="login.html">Back to login</a></p>
      </div>
    </main>
  </div>

  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
